
[betta]
	#Default: 90
	#Range: 0 ~ 100
	"How random the genes should be, 100 is all wildtype animals, 0 is completely random:" = 90
	#Default: 48000
	#Range: > 1
	"How many ticks it takes for a Betta to become an adult:" = 48000
	#Default: 24000
	#Range: > 1
	"How many ticks it takes a Betta egg to hatch:" = 24000
	#Default: 10
	#Range: 1 ~ 20
	"How highly Betta spawning is weighted, larger numbers spawn more:" = 5
	#Default: 4
	#Range: 1 ~ 60
	"The minimum number of Bettas you want to find in a group at spawn:" = 4
	#Default: 6
	#Range: 1 ~ 60
	"The maximum number of Bettas you want to find in a group at spawn" = 6
	#Default: false 
	#NOTE: I do not recommend enabling betta replacement unless you've disabled spawns for your other betta mod (e.g. DragN's or Coda's respective betta mods). Genetic bettas don't despawn, so you will get far too many spawns otherwise!
	"Replace Bettas from other mods" = false
	#Default: false
	"Allow aquatic plants to be duplicated with bonemeal" = false

